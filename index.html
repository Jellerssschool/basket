<!DOCTYPE html>
<html>
<head>
  <title>My Games</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .game-list {
      max-width: 500px;
      margin: 40px auto;
      text-align: left;
    }

    .game {
      display: block;
      background: #222;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      text-decoration: none;
      color: white;
      transition: 0.15s;
    }

    .game:hover {
      background: #333;
      transform: translateX(5px);
    }
  </style>
</head>

<body>

<h1>nothing suspicious here</h1>

<div class="game-list" id="games"></div>

<script>
fetch("games.json")
  .then(res => res.json())
  .then(files => {
    const container = document.getElementById("games");

    files.sort(); // optional: alphabetical order

    files.forEach(file => {
      const name = file
        .replace(".html", "")
        .replace(/[-_]/g, " ");

      const link = document.createElement("a");
      link.href = "games/" + file;
      link.className = "game";
      link.textContent = name;

      container.appendChild(link);
    });
  });
</script>

</body>
</html>
